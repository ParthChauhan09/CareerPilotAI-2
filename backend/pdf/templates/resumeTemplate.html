<!DOCTYPE html>
<html>

<head>
  <title>{{title}}</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      line-height: 1.6;
      color: #333;
      margin: 0;
      padding: 30px;
      position: relative;
      min-height: 100vh;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
      border-bottom: 2px solid #3498db;
      padding-bottom: 10px;
    }

    h1 {
      color: #2c3e50;
      margin-bottom: 5px;
    }

    h2 {
      color: #3498db;
      border-bottom: 1px solid #eee;
      padding-bottom: 5px;
      margin-top: 30px;
      margin-bottom: 15px;
    }

    ul {
      margin-top: 10px;
      margin-bottom: 20px;
      padding-left: 20px;
    }

    li {
      margin-bottom: 8px;
    }

    .date {
      color: #7f8c8d;
      font-size: 0.9em;
      text-align: right;
      margin-bottom: 25px;
    }

    .content {
      margin-top: 25px;
      margin-bottom: 60px; /* Space for footer */
    }

    .section {
      margin-bottom: 25px;
    }

    .footer {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.9em;
      color: #7f8c8d;
      border-top: 1px solid #eee;
      padding-top: 15px;
    }

    .skills-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .skill-item {
      background-color: #f0f7ff;
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 0.9em;
    }
  </style>
</head>

<body>
  <div class="header">
    <h1 id="document-title">{{title}}</h1>
  </div>

  <div class="date">Generated on {{date}}</div>

  <div class="content">
    {{content}}
  </div>

  <div class="footer">
    Generated by CareerPilotAI | Professional Career Documents
  </div>
</body>

</html>
