<!DOCTYPE html>
<html>

<head>
  <title>{{title}}</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      line-height: 1.6;
      color: #333;
      margin: 0;
      padding: 40px;
      position: relative;
      min-height: 100vh;
    }

    .letter-header {
      text-align: right;
      margin-bottom: 30px;
      font-weight: 500;
    }

    h1 {
      color: #2c3e50;
      margin-bottom: 25px;
      text-align: center;
    }

    .content {
      margin-top: 25px;
      text-align: justify;
      margin-bottom: 80px;
      /* Space for footer */
    }

    .signature {
      margin-top: 50px;
      margin-bottom: 20px;
    }

    .footer {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.9em;
      color: #7f8c8d;
      border-top: 1px solid #eee;
      padding-top: 15px;
    }

    p {
      margin-bottom: 18px;
    }

    .recipient {
      margin-bottom: 25px;
    }

    .greeting {
      margin-bottom: 20px;
    }

    .closing {
      margin-top: 30px;
    }
  </style>
</head>

<body>
  <div class="letter-header">
    <div>{{date}}</div>
  </div>

  <h1>{{title}}</h1>

  <div class="content">
    {{content}}
  </div>

  <div class="footer">
    Generated by CareerPilotAI | Professional Career Documents
  </div>
</body>

</html>
